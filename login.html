<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/login.css">
    <title>Login</title>

</head>

<body>
    <div class="Container1">
        <nav>
            <ul>
                <li><a href="index.html">回到首页</a></li>
                <li><a href="login.html">登录页</a></li>
            </ul>
        </nav>

    </div>
    <!-- 登录注册 -->
    <div class="Container22">
        <div class="Container2">
            <div class="div-description">
                <img src="images/login.jpg" alt="登录图">
            </div>
            <div class="div-form">
                <form action="" class="form-login">
                    <h1>login</h1>
                    <input type="text" placeholder="账号">
                    <input type="password" placeholder="密码">
                    <!-- 新增多选框部分 -->
                    <div class="version-radio">
                        <input type="radio" id="community" name="version" value="community">
                        <label for="community">社区版</label>
                        <input type="radio" id="professional" name="version" value="professional">
                        <label for="professional">专业版</label>
                    </div>

                    <button type="submit" id="loginBtn">Login</button>
                    <div class="control">
                        <span>没有账号？<a href="#">Register</a></span>
                    </div>

                </form>

                <form action="" class="form-register disappear">
                    <h1>Register</h1>
                    <input type="text" placeholder="账号">
                    <input type="password" placeholder="密码">
                    <button type="submit" id="registerBtn">Register</button>
                    <div class="control">
                        <span>已有账号？<a href="#">Login</a></span>
                    </div>
                </form>
            </div>

            <div class="div-description">
                <img src="images/login.jpg" alt="注册图">
            </div>
        </div>

    </div>
    <script type="text/javascript" src="js/login.js"></script>
</body>

</html>
